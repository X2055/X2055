<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gator苏维埃电台</title>
    <style>
        /* ========================================= */
        /* 全局重置与背景                            */
        /* ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 核心：苏维埃红色背景 */
            background-color: #8B0000; 
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 0, 0, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 0, 0, 0.3) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
        }

        /* ========================================= */
        /* 主容器：模拟老式海报/指挥中心面板           */
        /* ========================================= */
        .soviet-container {
            width: 100%;
            max-width: 960px;
            background: rgba(120, 0, 0, 0.7); /* 稍深的红，增加层次感 */
            border: 3px solid #FFD700; /* 金色边框 */
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.4);
            padding: 30px;
        }

        /* ========================================= */
        /* 标题区域                                   */
        /* ========================================= */
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 38px;
            color: #FFFFFF;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.8);
        }

        .header p {
            color: #FFD700;
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* ========================================= */
        /* 电视机框架                                 */
        /* ========================================= */
        .tv-frame {
            background: #1a1a1a; /* 电视机外壳为碳黑色 */
            padding: 12px;
            border-radius: 15px; /* 老式电视的圆角 */
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.9), /* 内凹感 */
                0 5px 15px rgba(0,0,0,0.5);
            border: 4px solid #333;
            position: relative;
        }

        /* 屏幕区域 */
        .screen {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 比例 */
            background: #000;
            border-radius: 8px;
            overflow: hidden; /* 隐藏溢出的扫描线 */
        }

        /* Bilibili Iframe */
        .screen iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* ========================================= */
        /* 战争质感滤镜 (核心)                         */
        /* ========================================= */
        .war-filter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* 不干扰点击 */
            
            /* 1. 暗角效果 (Vignette) - 模拟瞄准镜或监控画面 */
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9);

            /* 2. 扫描线 (Scanlines) - 模拟老旧信号 */
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.2) 0px,
                rgba(0, 0, 0, 0.2) 1px,
                transparent 1px,
                transparent 3px
            );

            /* 3. 轻微的闪烁动画 */
            animation: flicker 5s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }

        /* ========================================= */
        /* 底部状态栏 (军事UI风格)                     */
        /* ========================================= */
        .status-bar {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .status-bar .time {
            color: #FFFFFF;
        }

        /* ========================================= */
        /* 移动端适配                                 */
        /* ========================================= */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .soviet-container {
                padding: 15px;
            }
            .header h1 {
                font-size: 22px;
                letter-spacing: 2px;
            }
            .status-bar {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="soviet-container">
        <!-- 标题 -->
        <div class="header">
            <h1>苏维埃社会主义共和国联盟</h1>
            <p>RED ARMY BROADCASTING SERVICE</p>
        </div>

        <!-- 电视机 -->
        <div class="tv-frame">
            <div class="screen">
                <iframe 
                    src="https://player.bilibili.com/player.html?bvid=BV1gCLA6vEqY&page=1&high_quality=1&danmaku=0" 
                    scrolling="no" 
                    border="0" 
                    frameborder="no" 
                    framespacing="0" 
                    allowfullscreen="true">
                </iframe>
                
                <!-- 战争滤镜层 -->
                <div class="war-filter"></div>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span>STATUS: <strong>ON AIR</strong></span>
            <span>SIGNAL: <strong>LOCKED</strong></span>
            <span class="time">DATE: 1945.05.09</span>
        </div>
    </div>

</body>
</html>
