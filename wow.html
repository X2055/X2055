<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СССР Archive</title>
    <style>
        :root {
            --dark-red-bg: #8B0000;   /* 深暗国旗红 */
            --gold: #FFD700;         /* 金色 */
            --text-color: #FFFFFF;   /* 白色文字 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-red-bg);
            font-family: 'Arial', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 顶部大标题样式 */
        .main-header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            position: relative;
            z-index: 10;
        }

        .main-header h1 {
            font-size: 2.8rem;
            letter-spacing: 5px;
            color: var(--text-color);
            text-transform: uppercase;
            text-shadow: 
                4px 4px 0px rgba(0, 0, 0, 0.5),
                6px 6px 0px rgba(0, 0, 0, 0.2);
            font-weight: 900;
            margin-bottom: 5px;
        }

        .sub-line {
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* 容器样式 */
        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(0, 0, 0, 0.15);
            border: 2px solid var(--gold);
            box-shadow: 
                0 0 25px rgba(0, 0, 0, 0.5),
                inset 0 0 15px rgba(0, 0, 0, 0.2);
            padding: 25px;
            margin-bottom: 40px;
            position: relative;
        }

        /* 视频包装器 */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            background-color: #000;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        /* 视频元素本身 */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            filter: sepia(0.4) contrast(1.1);
        }

        /* 底部信息栏 */
        .status-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #FFF;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar .author {
            font-weight: bold;
            font-size: 14px;
            color: var(--gold);
        }

        .status-bar .signal {
            color: #FFF;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .main-header h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
                text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
            }
            .container {
                width: 95%;
                padding: 15px;
            }
            .status-bar {
                flex-direction: column;
                gap: 5px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部大标题 -->
    <div class="main-header">
        <h1>苏维埃社会主义共和国联盟</h1>
        <p class="sub-line">RED ARMY ARCHIVES // CLASSIFIED FOOTAGE</p>
    </div>

    <div class="container">
        <div class="video-wrapper">
            <!-- 请确保您的视频文件与此HTML文件在同一目录，或修正路径 -->
            <video controls autoplay muted loop playsinline>
                <source src="Video_1779114308250_433.mp4" type="video/mp4">
                您的浏览器不支持播放此视频。
            </video>
        </div>

        <div class="status-bar">
            <span class="author">Union of Soviet Socialist Republics</span>
            <span class="signal">STATUS: NORMAL TRANSMISSION</span>
            <span>DATE: 1945.05.09</span>
        </div>
    </div>

</body>
</html>
