<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真理报 | 苏维埃社会主义共和国联盟</title>
    <style>
        body { font-family: 'SimSun', serif; background: #5a0000; color: #f5f5dc; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: rgba(90,0,0,0.9); padding: 30px; border: 4px double #b8860b; }
        h1 { text-align: center; color: #f5f5dc; font-size: 3rem; text-shadow: 3px 3px 0 #000; }
        .subtitle { text-align: center; color: #b8860b; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #333; border: 1px solid #b8860b; color: #fff; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: #8b0000; color: #f5f5dc; border: 2px solid #b8860b; font-size: 1.2rem; cursor: pointer; }
        button:hover { background: #a52a2a; }
        .news-item { background: rgba(139,0,0,0.3); border-left: 5px solid #b8860b; padding: 15px; margin-top: 20px; }
        .status { text-align: center; padding: 10px; margin-top: 10px; display: none; font-weight: bold; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>真理报</h1>
        <p class="subtitle">Правда | 第108特别方面军官方喉舌</p>
        
        <div>
            <input id="title" placeholder="新闻标题">
            <input id="author" placeholder="记者姓名">
            <textarea id="content" rows="5" placeholder="新闻正文"></textarea>
            <button onclick="publish()">发布到云端</button>
            <div id="status" class="status"></div>
        </div>

        <hr style="margin: 40px 0; border-color: #b8860b;">

        <div id="newsList"></div>
    </div>

    <script>
        // 配置
        const SUPABASE_URL = 'https://aiqsqbbvexvmuptrtvkn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpcXNxYmJ2ZXh2bXVwdHJ0dmtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTA4NTYsImV4cCI6MjA5NDU2Njg1Nn0.-zEw5w6RuFX7IalXvemL8lKlcVDWPphDrH_6pU30tjI';
        
        // 发布新闻（使用原生 Fetch API）
        async function publish() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;
            const status = document.getElementById('status');

            if (!title || !author || !content) {
                status.innerText = '请填写所有字段！';
                status.className = 'status error';
                status.style.display = 'block';
                return;
            }

            status.innerText = '正在发布...';
            status.className = 'status';
            status.style.display = 'block';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/news`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal' // 不返回数据，减少出错可能
                    },
                    body: JSON.stringify({
                        title: title,
                        author: author,
                        content: content
                    })
                });

                if (response.ok) {
                    status.innerText = '发布成功！';
                    status.className = 'status success';
                    document.getElementById('title').value = '';
                    document.getElementById('author').value = '';
                    document.getElementById('content').value = '';
                    loadNews();
                } else {
                    const errorText = await response.text();
                    status.innerText = `发布失败 (${response.status}): ${errorText}`;
                    status.className = 'status error';
                }
            } catch (error) {
                status.innerText = '网络错误：' + error.message;
                status.className = 'status error';
            }
        }

        // 加载新闻
        async function loadNews() {
            const list = document.getElementById('newsList');
            list.innerHTML = '<p>加载中...</p>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/news?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) {
                    list.innerHTML = '<p style="color:red;">加载失败：' + response.statusText + '</p>';
                    return;
                }
                
                const data = await response.json();
                list.innerHTML = '<h2 style="color:#b8860b;">📰 最新消息</h2>';
                
                if (data.length === 0) {
                    list.innerHTML += '<p style="text-align:center;">暂无新闻。</p>';
                    return;
                }
                
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `<strong>${item.title}</strong><br><small>记者：${item.author} | ${new Date(item.created_at).toLocaleString()}</small><p>${item.content}</p>`;
                    list.appendChild(div);
                });
            } catch (error) {
                list.innerHTML = '<p style="color:red;">加载出错：' + error.message + '</p>';
            }
        }

        // 页面加载时执行
        loadNews();
    </script>
</body>
</html>
